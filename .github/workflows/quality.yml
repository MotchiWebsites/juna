name: Quality

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

concurrency:
    group: quality-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            DJANGO_SECRET_KEY: ci-only-7Hj4mQ9vL2xR8sT5wK1pN6cB3dF0gY7uA4eZ9iO2xL5m
            DJANGO_DEBUG: "False"
            DJANGO_ALLOWED_HOSTS: juna.example
            DJANGO_CSRF_TRUSTED_ORIGINS: https://juna.example
            SITE_URL: https://juna.example

        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version-file: .python-version
                  cache: pip

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version-file: .nvmrc
                  cache: npm

            - name: Install dependencies
              run: |
                  python -m pip install --disable-pip-version-check -r requirements.txt
                  npm ci

            - name: Run Django checks and tests
              run: |
                  DJANGO_SETTINGS_MODULE=config.production_settings python manage.py check
                  DJANGO_SETTINGS_MODULE=config.production_settings python manage.py check --deploy
                  python manage.py test
                  python manage.py makemigrations --check --dry-run

            - name: Build production assets
              run: |
                  npm run build
                  DJANGO_SETTINGS_MODULE=config.production_settings python manage.py collectstatic --noinput
