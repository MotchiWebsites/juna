{% load i18n static %}
<!DOCTYPE html>
<html lang="en-CA" class="min-h-full bg-neutral-50">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex,nofollow" />
        <title>Signed Out | Juna Admin</title>
        <link rel="stylesheet" href="https://use.typekit.net/phi6nyg.css" />
        <link rel="stylesheet" href="{% static 'css/app.css' %}" />
        <link rel="icon" href="{% static 'favicon/favicon.ico' %}" sizes="48x48" />
    </head>
    <body class="min-h-screen bg-neutral-50 font-sans text-neutral-950">
        <main class="flex min-h-screen items-center justify-center px-5 py-10">
            <section class="w-full max-w-lg rounded-lg border border-neutral-200 bg-white p-6 text-center shadow-sm sm:p-10" aria-labelledby="signed-out-title">
                <a
                    href="{% url 'website:home' %}"
                    class="inline-flex items-center gap-3 rounded-lg p-2 pr-4 text-green focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-green"
                >
                    <img src="{% static 'images/juna_logo.png' %}" alt="Juna" width="710" height="363" class="h-12 w-auto" />
                    <span class="font-regular text-sm font-semibold">Main website</span>
                </a>
                <p class="font-regular mt-8 text-sm font-semibold tracking-widest text-green uppercase">Staff workspace</p>
                <h1 id="signed-out-title" class="mt-3 text-4xl font-semibold leading-none sm:text-5xl">Signed Out</h1>
                <p class="font-regular mx-auto mt-4 max-w-sm text-sm leading-relaxed text-neutral-600">
                    You have been signed out securely. Sign in again when you are ready to continue.
                </p>
                <div class="mt-8 grid gap-3 sm:grid-cols-2">
                    <a
                        href="{% url 'admin:login' %}"
                        class="font-regular inline-flex min-h-12 items-center justify-center rounded-lg bg-pink px-5 py-3 text-sm font-semibold text-white transition hover:bg-green focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-pink"
                    >
                        Sign In Again
                    </a>
                    <a
                        href="{% url 'website:home' %}"
                        class="font-regular inline-flex min-h-12 items-center justify-center rounded-lg border border-green px-5 py-3 text-sm font-semibold text-green transition hover:bg-green hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-green"
                    >
                        View Main Website
                    </a>
                </div>
            </section>
        </main>
    </body>
</html>
