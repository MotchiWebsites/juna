<div>
    <label
        for="{{ field.id_for_label }}"
        class="sr-only"
    >
        {{ field.label }}{% if field.field.required %}<span aria-hidden="true"> *</span>{% endif %}
    </label>

    {% if multiline %}
        <textarea
            name="{{ field.html_name }}"
            id="{{ field.id_for_label }}"
            rows="{{ field.field.widget.attrs.rows }}"
            maxlength="{{ field.field.max_length }}"
            placeholder="{{ field.field.widget.attrs.placeholder }}"
            class="font-regular min-h-56 w-full resize-y rounded-2xl border bg-white px-5 py-4 text-base leading-normal text-neutral-950 outline-none transition duration-200 placeholder:text-neutral-400 hover:border-green focus:border-green focus:ring-2 focus:ring-green/20 sm:min-h-72 sm:px-7 sm:py-5 sm:text-lg lg:min-h-64 lg:px-6 lg:py-4 lg:text-base {% if field.errors %}border-pink{% else %}border-neutral-900{% endif %}"
            {% if field.field.required %}required aria-required="true"{% endif %}
            {% if field.errors %}aria-invalid="true" aria-describedby="{{ field.auto_id }}-errors"{% endif %}
        >{{ field.value|default_if_none:"" }}</textarea>
    {% else %}
        <input
            type="{{ field.field.widget.input_type }}"
            name="{{ field.html_name }}"
            id="{{ field.id_for_label }}"
            value="{{ field.value|default_if_none:'' }}"
            maxlength="{{ field.field.max_length }}"
            placeholder="{{ field.field.widget.attrs.placeholder }}"
            {% if field.field.widget.attrs.autocomplete %}autocomplete="{{ field.field.widget.attrs.autocomplete }}"{% endif %}
            class="font-regular h-14 w-full rounded-2xl border bg-white px-5 text-base text-neutral-950 outline-none transition duration-200 placeholder:text-neutral-400 hover:border-green focus:border-green focus:ring-2 focus:ring-green/20 sm:h-16 sm:px-7 sm:text-lg lg:h-14 lg:px-6 lg:text-base {% if field.errors %}border-pink{% else %}border-neutral-900{% endif %}"
            {% if field.field.required %}required aria-required="true"{% endif %}
            {% if field.errors %}aria-invalid="true" aria-describedby="{{ field.auto_id }}-errors"{% endif %}
        />
    {% endif %}

    {% if field.errors %}
        <ul
            id="{{ field.auto_id }}-errors"
            class="font-regular mt-2 space-y-1 px-2 text-sm text-pink"
            role="alert"
        >
            {% for error in field.errors %}
                <li>{{ error }}</li>
            {% endfor %}
        </ul>
    {% endif %}
</div>
