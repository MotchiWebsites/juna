{% for message in messages %}
    <div
        class="pointer-events-auto flex translate-y-2 items-start gap-3 rounded-2xl border bg-white px-4 py-3 opacity-0 shadow-lg transition duration-300
               {% if message.tags == 'success' %}border-green/30 text-green{% elif message.tags == 'error' %}border-pink/30 text-pink{% elif message.tags == 'warning' %}border-gold/30 text-gold{% else %}border-blue/30 text-blue{% endif %}"
        data-toast
        role="{% if message.tags == 'error' %}alert{% else %}status{% endif %}"
    >
        <span
            class="mt-0.5 flex size-6 shrink-0 items-center justify-center rounded-full border border-current"
            aria-hidden="true"
        >
            {% if message.tags == "success" %}✓{% else %}!{% endif %}
        </span>
        <p class="font-regular flex-1 text-sm leading-normal text-neutral-800">
            {{ message }}
        </p>
        <button
            type="button"
            class="shrink-0 rounded-md p-1 text-neutral-500 transition-colors hover:text-neutral-950 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-current"
            data-toast-dismiss
            aria-label="Dismiss notification"
        >
            <svg
                viewBox="0 0 24 24"
                class="size-4"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                aria-hidden="true"
            >
                <path d="M6 6l12 12M18 6 6 18"></path>
            </svg>
        </button>
    </div>
{% endfor %}
