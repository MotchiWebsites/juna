{% load static %}
<footer class="relative z-50 border-t border-neutral-300 bg-white">
    <div
        class="font-regular px-6 py-6 text-sm text-neutral-600 sm:px-10 lg:px-16"
    >
        <div
            class="flex flex-wrap items-center justify-between gap-4"
        >
            <p>© {% now "Y" %} Juna. All rights reserved.</p>
            <nav aria-label="Footer navigation">
                <ul class="flex items-center gap-5">
                    <li>
                        <a
                            href="#overview"
                            class="transition-colors hover:text-neutral-950 focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-green"
                        >
                            Overview
                        </a>
                    </li>
                    <li>
                        <a
                            href="#contact"
                            class="transition-colors hover:text-neutral-950 focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-green"
                        >
                            Contact
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
        <a
            href="https://motchi.ca"
            class="group mt-5 ml-auto flex w-fit items-center gap-1.5 text-xs text-neutral-400 transition-colors duration-300 hover:text-neutral-700 focus-visible:outline-2 focus-visible:outline-offset-4 focus-visible:outline-green"
            target="_blank"
            rel="noopener noreferrer"
        >
            <span>Created by</span>
            <img
                src="{% static 'icons/green_star.svg' %}"
                alt=""
                width="16"
                height="16"
                class="h-4 w-4 shrink-0 opacity-60 transition-transform duration-300 ease-out group-hover:rotate-12 group-hover:scale-110"
            />
            <span
                class="relative after:absolute after:right-0 after:-bottom-0.5 after:h-px after:w-0 after:bg-current after:transition-all after:duration-300 group-hover:after:w-full"
            >
                Motchi Websites
            </span>
        </a>
    </div>
</footer>
