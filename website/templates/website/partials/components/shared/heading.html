{% if heading.level == 1 %}
    <h1
        id="{{ heading.heading_id }}"
        class="font-display font-semibold
               {% if heading.variant == "hero" %}
               max-w-4xl text-xl sm:text-2xl leading-loose md:text-3xl lg:text-4xl xl:text-5xl
               {% else %}
               text-3xl leading-normal sm:text-4xl lg:text-4xl
               {% if heading.variant != "natural-wrap" %}
               text-balance
               {% endif %}
               {% endif %}"
        data-reveal
        data-shared-heading
    >
        {% include "website/partials/components/shared/heading_segments.html" with heading=heading only %}
    </h1>
{% else %}
    <h2
        id="{{ heading.heading_id }}"
        class="font-display font-semibold
               {% if heading.variant == "hero" %}
               max-w-4xl text-xl sm:text-2xl leading-loose md:text-3xl lg:text-4xl xl:text-5xl
               {% else %}
               text-3xl leading-normal sm:text-4xl lg:text-4xl
               {% if heading.variant != "natural-wrap" %}
               text-balance
               {% endif %}
               {% endif %}"
        data-reveal
        data-shared-heading
    >
        {% include "website/partials/components/shared/heading_segments.html" with heading=heading only %}
    </h2>
{% endif %}
