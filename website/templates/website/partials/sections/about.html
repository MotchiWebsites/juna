<section
    id="about"
    class="flex min-h-screen scroll-mt-20 items-center px-6 sm:px-10 lg:scroll-mt-0 lg:px-site-edge xl:px-12"
    tabindex="-1"
    aria-labelledby="about-title"
>
    <div class="mx-auto w-full max-w-6xl">
        {% include "website/partials/components/shared/heading.html" with heading=headings.about only %}

        <div class="mt-12 grid gap-20 sm:mt-14 lg:mt-12 lg:gap-14 xl:gap-16">
            {% for member in team_members %}
                {% include "website/partials/components/about/team_member.html" with member=member only %}
            {% endfor %}
        </div>
    </div>
</section>
