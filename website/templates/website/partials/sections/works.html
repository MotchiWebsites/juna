<section
    id="works"
    class="max-w-5xl scroll-mt-20 px-6 sm:px-10 lg:scroll-mt-0 lg:pl-site-edge lg:pr-12"
    tabindex="-1"
>
    <div class="mx-auto w-full max-w-375">
        <h2
            class="font-display max-w-4xl text-5xl leading-none sm:text-7xl"
            data-reveal
        >
            Our <span class="text-emphasis text-emphasis--gold">Works</span>
        </h2>

        {# A mobile stack becomes a two-column bento on tablet and an editorial mosaic on desktop. #}
        <div
            class="mt-12 grid gap-5 sm:grid-cols-2 lg:mt-16 lg:h-[min(67vw,59rem)] lg:grid-cols-12 lg:grid-rows-[1.3fr_2fr_1fr]"
        >
            {% for work, layout in work_grid %}
                {% include "website/partials/components/works/work_figure.html" with work=work layout=layout only %}
            {% endfor %}
        </div>
    </div>
</section>
